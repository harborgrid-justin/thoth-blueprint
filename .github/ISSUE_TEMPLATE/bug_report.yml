name: Bug Report
description: Report an issue or bug with Thoth Blueprint
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        We're sorry to hear you have a problem. Can you help us solve it by providing the following details.
  - type: dropdown
    id: area
    attributes:
      label: Which part of the project?
      description: Thoth Blueprint is now a cloud planning platform; the original DB-design app is archived under `artifact/`.
      options:
        - New planning platform (repository root)
        - Archived DB-design app (artifact/)
        - Not sure
    validations:
      required: true
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: What did you expect to happen?
      placeholder: I cannot currently do X thing because when I do, it breaks X thing.
    validations:
      required: true
  - type: textarea
    id: how-to-reproduce
    attributes:
      label: How to reproduce the bug
      description: How did this occur? Please provide steps to reproduce the issue.
      placeholder: When I do X I see Y.
    validations:
      required: true
  - type: input
    id: app-version
    attributes:
      label: Version / commit
      description: For the archived app, the version is in app settings. For the new platform, the commit SHA or branch is fine.
      placeholder: e.g. 0.0.11, or commit abc1234
    validations:
      required: false
  - type: dropdown
    id: browsers
    attributes:
      label: What browsers are you seeing the problem on?
      description: You may select more than one.
      multiple: true
      options:
        - Firefox
        - Chrome
        - Safari
        - Microsoft Edge
        - Opera
        - Other
  - type: textarea
    id: notes
    attributes:
      label: Additional Notes
      description: Use this field to provide any other notes that you feel might be relevant to the issue.
    validations:
      required: false
