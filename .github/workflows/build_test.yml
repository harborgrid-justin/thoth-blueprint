name: Build and Test

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  # The original Thoth Blueprint DB-design app now lives under artifact/.
  # It is archived but still built in CI to guard against regressions.
  artifact-build:
    name: Build archived app (artifact/)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: artifact

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install pnpm
        run: |
          npm install -g pnpm
          pnpm --version

      - name: Install dependencies
        run: pnpm install

      - name: Run type checking
        run: pnpm run type-check

      - name: Run linter
        run: pnpm run lint

      - name: Build application
        run: pnpm run build

      - name: Check if build was successful
        run: |
          if [ ! -d dist ]; then
            echo "❌ Build directory not found!"
            exit 1
          fi
          echo "✅ Build successful"

  # The framework-agnostic planning domain model.
  domain-test:
    name: Test domain model (packages/domain)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/domain
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Type-check
        run: npm run type-check

      - name: Run tests
        run: npm test

  # The default internal storage layer (SQLite by default, swappable backend).
  storage-test:
    name: Test storage layer (packages/storage)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/storage
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Type-check
        run: npm run type-check

      - name: Lint
        run: npm run lint

      - name: Run tests
        run: npm test

  # The Rust core (crates/) that packages/domain, packages/storage, and
  # services/* are being migrated onto — see docs/RUST_MIGRATION.md. Five
  # domain crates (thoth-planning, thoth-survey, thoth-civil, thoth-drawing,
  # thoth-services) may be mid-port at any given time; this job is honest
  # about that in its own name rather than implying an all-green Rust
  # workspace is a hard requirement yet. thoth-spatial and the
  # thoth-bindings/thoth-napi integration crates are expected to always be
  # green — see crates/README.md.
  rust-workspace:
    name: Rust workspace (crates/) — fmt, clippy, test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust (per rust-toolchain.toml)
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo registry and build artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: cargo fmt --check
        run: cargo fmt --all -- --check

      - name: cargo clippy --workspace --all-targets -- -D warnings
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: cargo test --workspace
        run: cargo test --workspace

  # The cloud planning workspace (browser client).
  web-build:
    name: Build planning workspace (apps/web)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install domain dependencies
        run: npm install
        working-directory: packages/domain

      - name: Install web dependencies
        run: npm install

      - name: Type-check
        run: npm run type-check

      - name: Build
        run: npm run build

      - name: Check if build was successful
        run: |
          if [ ! -d dist ]; then
            echo "❌ Build directory not found!"
            exit 1
          fi
          echo "✅ Build successful"
