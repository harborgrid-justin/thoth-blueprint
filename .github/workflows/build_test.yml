name: Build and Test

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  # The original Thoth Blueprint DB-design app now lives under artifact/.
  # It is archived but still built in CI to guard against regressions.
  artifact-build:
    name: Build archived app (artifact/)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: artifact

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install pnpm
        run: |
          npm install -g pnpm
          pnpm --version

      - name: Install dependencies
        run: pnpm install

      - name: Run type checking
        run: pnpm run type-check

      - name: Run linter
        run: pnpm run lint

      - name: Build application
        run: pnpm run build

      - name: Check if build was successful
        run: |
          if [ ! -d dist ]; then
            echo "❌ Build directory not found!"
            exit 1
          fi
          echo "✅ Build successful"
